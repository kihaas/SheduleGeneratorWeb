<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ScheduleGenerator{% endblock %}</title>

    <!-- Font Awesome для иконок -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- Единый стиль авторизации -->
    <link rel="stylesheet" href="../static/css/auth.css">

    {% block extra_css %}{% endblock %}
</head>
<body>

    <!-- Топбар -->
    <nav class="auth-topbar">
        <a href="/" class="topbar-brand">
            <i class="fas fa-graduation-cap"></i>
            ScheduleGenerator
        </a>
        <div class="topbar-actions" id="auth-bar">
            <!-- Заполняется через auth.js -->
        </div>
    </nav>

    <!-- Контент страницы -->
    {% block content %}{% endblock %}

    <!-- Кнопка темы -->
    <button class="theme-toggle" id="themeToggle" title="Переключить тему">
        <i class="fas fa-moon"></i>
    </button>

    <!-- Скрипт темы (инлайн, чтобы не было мигания) -->
    <script>
        (function() {
            const saved = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', saved);
            // Иконку обновим после загрузки
        })();
    </script>

    <!-- Auth JS -->
    <script src="/static/js/auth.js"></script>

    {% block extra_js %}{% endblock %}

    <script>
        // Тема — кнопка переключения
        const themeBtn = document.getElementById('themeToggle');
        const themeIcon = themeBtn ? themeBtn.querySelector('i') : null;

        function applyTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);
            if (themeIcon) {
                themeIcon.className = theme === 'dark' ? 'fas fa-sun' : 'fas fa-moon';
            }
        }

        // Применяем сохранённую тему к иконке
        applyTheme(localStorage.getItem('theme') || 'light');

        if (themeBtn) {
            themeBtn.addEventListener('click', () => {
                const current = document.documentElement.getAttribute('data-theme');
                applyTheme(current === 'dark' ? 'light' : 'dark');
            });
        }
    </script>
</body>
</html>
