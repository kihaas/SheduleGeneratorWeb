<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — ScheduleGenerator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            align-items: center;
        }
        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .btn-primary {
            background: #667eea;
            border: none;
        }
        .btn-primary:hover {
            background: #5a6fd8;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card p-4">
                    <div class="card-body">
                        <h2 class="text-center mb-4">Вход в систему</h2>
                        <h5 class="text-center text-muted mb-4">Schedule Generator</h5>

                        <div id="error-alert" class="alert alert-danger d-none"></div>

                        <form id="login-form">
                            <div class="mb-3">
                                <label for="username" class="form-label">Логин (username)</label>
                                <input type="text" class="form-control" id="username" required autocomplete="username">
                            </div>
                            <div class="mb-3">
                                <label for="password" class="form-label">Пароль</label>
                                <input type="password" class="form-control" id="password" required autocomplete="current-password">
                            </div>

                            <button type="submit" class="btn btn-primary w-100 py-2 mt-3">Войти</button>
                        </form>

                        <div class="text-center mt-4">
                            <p class="mb-0">Нет аккаунта?
                                <a href="/register" class="text-decoration-none">Зарегистрироваться</a>
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('login-form');
        const errorAlert = document.getElementById('error-alert');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorAlert.classList.add('d-none');

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            const formData = new URLSearchParams();
            formData.append('username', username);
            formData.append('password', password);

            try {
                const res = await fetch('/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: formData
                });

                if (res.ok) {
                    const data = await res.json();
                    localStorage.setItem('access_token', data.access_token);
                    window.location.href = '/';  // Переход на главную страницу расписания
                } else {
                    const err = await res.json();
                    errorAlert.textContent = err.detail || 'Неверный логин или пароль';
                    errorAlert.classList.remove('d-none');
                }
            } catch (err) {
                errorAlert.textContent = 'Ошибка соединения с сервером';
                errorAlert.classList.remove('d-none');
            }
        });
    </script>
</body>
</html>
