{% extends "base.html" %}

{% block title %}Вход — ScheduleGenerator{% endblock %}

{% block extra_css %}
<style>
    /* Убираем нативный глазик браузера (Edge/Chrome/IE) */
    input[type="password"]::-ms-reveal,
    input[type="password"]::-ms-clear {
        display: none !important;
    }
</style>
{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <div class="auth-card-accent"></div>
        <div class="auth-card-body">

            <h1 class="auth-title">С возвращением 👋</h1>
            <p class="auth-subtitle">
                <i class="fas fa-graduation-cap"></i>
                ScheduleGenerator
            </p>

            <div class="alert alert-danger hidden" id="error-alert">
                <i class="fas fa-exclamation-circle"></i>
                <span id="error-text">Ошибка</span>
            </div>

            <form class="auth-form" id="login-form" novalidate>

                <div class="form-group">
                    <label class="form-label" for="username">
                        <i class="fas fa-user" style="color: var(--primary); margin-right: 5px;"></i>
                        Логин
                    </label>
                    <input
                        type="text"
                        class="form-control"
                        id="username"
                        name="username"
                        placeholder="Введите ваш логин"
                        autocomplete="username"
                        required
                    >
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">
                        <i class="fas fa-lock" style="color: var(--primary); margin-right: 5px;"></i>
                        Пароль
                    </label>
                    <div class="input-wrapper">
                        <input
                            type="password"
                            class="form-control"
                            id="password"
                            name="password"
                            placeholder="Введите пароль"
                            autocomplete="current-password"
                            required
                        >
                        <!-- Только наш кастомный глазик, браузерный скрыт через CSS -->
                        <button type="button" class="toggle-password" data-target="password" title="Показать/скрыть пароль">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" class="btn-auth" id="submit-btn">
                    <div class="btn-spinner"></div>
                    <span class="btn-text">
                        <i class="fas fa-sign-in-alt"></i>
                        Войти
                    </span>
                </button>

            </form>

            <div class="auth-footer">
                Нет аккаунта?
                <a href="/register">Зарегистрироваться</a>
            </div>

        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="../static/js/login.js"></script>
{% endblock %}
