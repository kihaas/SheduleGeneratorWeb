{% extends "base.html" %}

{% block title %}Регистрация — ScheduleGenerator{% endblock %}

{% block extra_css %}
<style>
    /* Убираем нативный глазик браузера */
    input[type="password"]::-ms-reveal,
    input[type="password"]::-ms-clear {
        display: none !important;
    }
</style>
{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <div class="auth-card-accent"></div>
        <div class="auth-card-body">

            <h1 class="auth-title">Создать аккаунт</h1>
            <p class="auth-subtitle">
                <i class="fas fa-graduation-cap"></i>
                ScheduleGenerator
            </p>

            <div class="alert alert-danger hidden" id="error-alert">
                <i class="fas fa-exclamation-circle"></i>
                <span id="error-text">Ошибка</span>
            </div>

            <div class="alert alert-success hidden" id="success-alert">
                <i class="fas fa-check-circle"></i>
                <span id="success-text">Успешно!</span>
            </div>

            <form class="auth-form" id="register-form" novalidate>

                <!-- Логин -->
                <div class="form-group">
                    <label class="form-label" for="username">
                        <i class="fas fa-user" style="color: var(--primary); margin-right: 5px;"></i>
                        Логин
                    </label>
                    <input
                        type="text"
                        class="form-control"
                        id="username"
                        name="username"
                        placeholder="Минимум 3 символа"
                        autocomplete="username"
                        minlength="3"
                        required
                    >
                </div>

                <!-- Пароль -->
                <div class="form-group">
                    <label class="form-label" for="password">
                        <i class="fas fa-lock" style="color: var(--primary); margin-right: 5px;"></i>
                        Пароль
                    </label>
                    <div class="input-wrapper">
                        <input
                            type="password"
                            class="form-control"
                            id="password"
                            name="password"
                            placeholder="Минимум 6 символов"
                            autocomplete="new-password"
                            minlength="6"
                            required
                        >
                        <button type="button" class="toggle-password" data-target="password" title="Показать/скрыть пароль">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <!-- Повтор пароля -->
                <div class="form-group">
                    <label class="form-label" for="password2">
                        <i class="fas fa-lock" style="color: var(--primary); margin-right: 5px;"></i>
                        Повторите пароль
                    </label>
                    <div class="input-wrapper">
                        <input
                            type="password"
                            class="form-control"
                            id="password2"
                            name="password2"
                            placeholder="Введите пароль ещё раз"
                            autocomplete="new-password"
                            required
                        >
                        <button type="button" class="toggle-password" data-target="password2" title="Показать/скрыть пароль">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" class="btn-auth" id="submit-btn">
                    <div class="btn-spinner"></div>
                    <span class="btn-text">
                        <i class="fas fa-user-plus"></i>
                        Зарегистрироваться
                    </span>
                </button>

            </form>

            <div class="auth-footer">
                Уже есть аккаунт?
                <a href="/login">Войти</a>
            </div>

        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="../static/js/register.js"></script>
{% endblock %}
