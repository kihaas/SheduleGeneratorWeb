<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация — ScheduleGenerator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            align-items: center;
        }
        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .btn-success {
            background: #4caf50;
            border: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card p-4">
                    <div class="card-body">
                        <h2 class="text-center mb-4">Регистрация</h2>
                        <h5 class="text-center text-muted mb-4">Schedule Generator</h5>

                        <div id="error-alert" class="alert alert-danger d-none"></div>
                        <div id="success-alert" class="alert alert-success d-none"></div>

                        <form id="register-form">
                            <div class="mb-3">
                                <label for="username" class="form-label">Логин (username)</label>
                                <input type="text" class="form-control" id="username" required autocomplete="username" minlength="3">
                            </div>
                            <div class="mb-3">
                                <label for="password" class="form-label">Пароль</label>
                                <input type="password" class="form-control" id="password" required minlength="6">
                            </div>

                            <button type="submit" class="btn btn-success w-100 py-2 mt-3">Зарегистрироваться</button>
                        </form>

                        <div class="text-center mt-4">
                            <p class="mb-0">Уже есть аккаунт?
                                <a href="/login" class="text-decoration-none">Войти</a>
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('register-form');
        const errorAlert = document.getElementById('error-alert');
        const successAlert = document.getElementById('success-alert');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorAlert.classList.add('d-none');
            successAlert.classList.add('d-none');

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            try {
                const res = await fetch('/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                if (res.ok) {
                    successAlert.textContent = 'Аккаунт успешно создан! Теперь вы можете войти.';
                    successAlert.classList.remove('d-none');
                    setTimeout(() => {
                        window.location.href = '/login';
                    }, 2000);
                } else {
                    const err = await res.json();
                    errorAlert.textContent = err.detail || 'Ошибка регистрации';
                    errorAlert.classList.remove('d-none');
                }
            } catch (err) {
                errorAlert.textContent = 'Ошибка соединения с сервером';
                errorAlert.classList.remove('d-none');
            }
        });
    </script>
</body>
</html>
